runtime: custom
env: flex
service: flex-node-service-otel

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 2

env_variables:
  DD_API_KEY: "your_api_key_here"
  DD_SITE: "datadoghq.com"
  DD_SERVICE: "flex-node-service-otel"
  DD_ENV: "dev"
  OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: "http/protobuf"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "your endpoint here"

handlers:
- url: /static
  static_dir: static
- url: /.*
  script: auto